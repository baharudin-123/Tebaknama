<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tebak Pose Lucu 😭</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">

    <!-- Start -->
    <div id="startScreen">
      <h1>🤨 Tebak Pose Lucu</h1>
      <p>Tebak pose sesuai clue. Kalau bener, foto muncul 😭🔥</p>
      <button onclick="startGame()">Mulai Game</button>
    </div>

    <!-- Progress -->
    <div id="gameScreen" style="display:none;">
      <h2 id="levelText">Level 1/2</h2>
      <div class="progress-bar">
        <div id="progress"></div>
      </div>

      <div id="clues"></div>

      <div id="options"></div>

      <p id="message"></p>

      <div id="result" style="display:none;">
        <img id="photo" src="fotoay.jpg.jpeg" alt="Foto">
        <br>
        <button id="nextBtn" onclick="nextLevel()">Lanjut 😈</button>
      </div>
    </div>

    <!-- Finish -->
    <div id="finishScreen" style="display:none;">
      <h1>🎉 Selesai</h1>
      <p>Semua pose berhasil ditebak 😭🔥</p>
      <p id="scoreText"></p>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
